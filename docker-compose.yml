services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: jee-frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_GO_PREDICTOR_API_BASE_URL: ${NEXT_PUBLIC_GO_PREDICTOR_API_BASE_URL:-}
    expose:
      - "3000"
    networks:
      - app-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jee-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      CUTOFFS_CSV_DIR: /app/data-processing/data/cutoffs
      API_DOMAIN: ${API_DOMAIN:-localhost}
    expose:
      - "8080"
    networks:
      - app-net

  caddy:
    image: caddy:2.8-alpine
    container_name: jee-caddy
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
