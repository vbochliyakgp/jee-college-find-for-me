services:
  frontend:
    image: oven/bun:1.3.9-alpine
    container_name: jee-frontend-dev
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_GO_PREDICTOR_API_BASE_URL: ${NEXT_PUBLIC_GO_PREDICTOR_API_BASE_URL:-}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - app-net

  backend:
    image: golang:1.25-alpine
    container_name: jee-backend-dev
    working_dir: /src/backend
    command: sh -c "apk add --no-cache sqlite-libs && go run ./cmd/server"
    environment:
      PORT: "8080"
      CUTOFFS_CSV_DIR: /src/data-processing/data/cutoffs
      SERVICE_DOMAIN: ${SERVICE_DOMAIN:-localhost}
      CGO_ENABLED: "0"
    volumes:
      - ./backend:/src/backend
      - ./data-processing:/src/data-processing:ro
      - go_mod_cache:/go/pkg/mod
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - app-net

  caddy:
    image: caddy:2.8-alpine
    container_name: jee-caddy-dev
    environment:
      SERVICE_DOMAIN: ${SERVICE_DOMAIN:-localhost}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
      - caddy_config_dev:/config
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  frontend_node_modules:
  go_mod_cache:
  caddy_data_dev:
  caddy_config_dev:
